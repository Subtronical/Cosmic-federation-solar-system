function b64ToUint8(s){const bin=atob(s);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
async function launch(){
  document.getElementById('f').style.width='60%';
  const compressed=b64ToUint8(b64);
  const ds=new DecompressionStream('gzip');
  const writer=ds.writable.getWriter();
  writer.write(compressed);writer.close();
  const reader=ds.readable.getReader();
  const chunks=[];
  while(true){const {done,value}=await reader.read();if(done)break;chunks.push(value);}
  document.getElementById('f').style.width='90%';
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const merged=new Uint8Array(total);let offset=0;
  for(const c of chunks){merged.set(c,offset);offset+=c.length;}
  const html=new TextDecoder().decode(merged);
  document.getElementById('f').style.width='100%';
  setTimeout(()=>{document.open();document.write(html);document.close();},200);
}
launch();
